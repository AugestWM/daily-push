name: Daily Push

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Get Gold Price
        id: gold
        run: |
          GOLD_RESPONSE=$(curl -s -X GET 'https://v2.xxapi.cn/api/goldprice')
          echo "$GOLD_RESPONSE" > gold.json
          GOLD_PRICE=$(echo "$GOLD_RESPONSE" | jq -r '.data.bank_gold_bar_price[] | select(.bank=="建设银行龙鼎金条") | .price // "暂无"')
          echo "gold_price=$GOLD_PRICE" >> $GITHUB_OUTPUT

      - name: Get News
        id: news
        run: |
          NEWS_RESPONSE=$(curl -s -X GET 'https://v2.xxapi.cn/api/toutiaohot' \
            -H "Authorization: Bearer ${{ secrets.GOLD_API_KEY }}")
          echo "$NEWS_RESPONSE" > news.json
          
          CODE=$(echo "$NEWS_RESPONSE" | jq -r '.code // 0')
          if [ "$CODE" != "200" ]; then
            echo "news1=今日无热点新闻" >> $GITHUB_OUTPUT
          else
            # 提取前6条新闻标题
            for i in 1 2 3 4 5 6; do
              TITLE=$(echo "$NEWS_RESPONSE" | jq -r ".data[$((i-1))].title // \"\"")
              if [ -n "$TITLE" ]; then
                echo "news$i=$TITLE" >> $GITHUB_OUTPUT
              fi
            done
          fi

      - name: Get Access Token
        id: token
        run: |
          TOKEN_RESPONSE=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${{ secrets.WECHAT_APPID }}&secret=${{ secrets.WECHAT_SECRET }}")
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          echo "token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Send Gold Price Message
        run: |
          GOLD_PRICE="${{ steps.gold.outputs.gold_price }}"
          
          curl -s -X POST "https://api.weixin.qq.com/cgi-bin/message/template/send?access_token=${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg touser "${{ secrets.WECHAT_OPENID }}" \
              --arg template_id "${{ secrets.WECHAT_TEMPLATE_ID }}" \
              --arg gold_price "$GOLD_PRICE 元/克" \
              '{
                touser: $touser,
                template_id: $template_id,
                data: {
                  first: { value: "每日金价", color: "#173177" },
                  keyword1: { value: $gold_price, color: "#FF0000" },
                  keyword2: { value: " " },
                  remark: { value: "数据来自xxAPI" }
                }
              }')"

      - name: Send News 1
        if: steps.news.outputs.news1 != ''
        run: |
          curl -s -X POST "https://api.weixin.qq.com/cgi-bin/message/template/send?access_token=${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg touser "${{ secrets.WECHAT_OPENID }}" \
              --arg template_id "${{ secrets.WECHAT_TEMPLATE_ID }}" \
              --arg news "${{ steps.news.outputs.news1 }}" \
              '{
                touser: $touser,
                template_id: $template_id,
                data: {
                  first: { value: "头条热榜 1/6", color: "#173177" },
                  keyword1: { value: " " },
                  keyword2: { value: $news },
                  remark: { value: " " }
                }
              }')"

      - name: Send News 2
        if: steps.news.outputs.news2 != ''
        run: |
          curl -s -X POST "https://api.weixin.qq.com/cgi-bin/message/template/send?access_token=${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg touser "${{ secrets.WECHAT_OPENID }}" \
              --arg template_id "${{ secrets.WECHAT_TEMPLATE_ID }}" \
              --arg news "${{ steps.news.outputs.news2 }}" \
              '{
                touser: $touser,
                template_id: $template_id,
                data: {
                  first: { value: "头条热榜 2/6", color: "#173177" },
                  keyword1: { value: " " },
                  keyword2: { value: $news },
                  remark: { value: " " }
                }
              }')"

      - name: Send News 3
        if: steps.news.outputs.news3 != ''
        run: |
          curl -s -X POST "https://api.weixin.qq.com/cgi-bin/message/template/send?access_token=${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg touser "${{ secrets.WECHAT_OPENID }}" \
              --arg template_id "${{ secrets.WECHAT_TEMPLATE_ID }}" \
              --arg news "${{ steps.news.outputs.news3 }}" \
              '{
                touser: $touser,
                template_id: $template_id,
                data: {
                  first: { value: "头条热榜 3/6", color: "#173177" },
                  keyword1: { value: " " },
                  keyword2: { value: $news },
                  remark: { value: " " }
                }
              }')"

      - name: Send News 4
        if: steps.news.outputs.news4 != ''
        run: |
          curl -s -X POST "https://api.weixin.qq.com/cgi-bin/message/template/send?access_token=${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg touser "${{ secrets.WECHAT_OPENID }}" \
              --arg template_id "${{ secrets.WECHAT_TEMPLATE_ID }}" \
              --arg news "${{ steps.news.outputs.news4 }}" \
              '{
                touser: $touser,
                template_id: $template_id,
                data: {
                  first: { value: "头条热榜 4/6", color: "#173177" },
                  keyword1: { value: " " },
                  keyword2: { value: $news },
                  remark: { value: " " }
                }
              }')"

      - name: Send News 5
        if: steps.news.outputs.news5 != ''
        run: |
          curl -s -X POST "https://api.weixin.qq.com/cgi-bin/message/template/send?access_token=${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg touser "${{ secrets.WECHAT_OPENID }}" \
              --arg template_id "${{ secrets.WECHAT_TEMPLATE_ID }}" \
              --arg news "${{ steps.news.outputs.news5 }}" \
              '{
                touser: $touser,
                template_id: $template_id,
                data: {
                  first: { value: "头条热榜 5/6", color: "#173177" },
                  keyword1: { value: " " },
                  keyword2: { value: $news },
                  remark: { value: " " }
                }
              }')"

      - name: Send News 6
        if: steps.news.outputs.news6 != ''
        run: |
          curl -s -X POST "https://api.weixin.qq.com/cgi-bin/message/template/send?access_token=${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg touser "${{ secrets.WECHAT_OPENID }}" \
              --arg template_id "${{ secrets.WECHAT_TEMPLATE_ID }}" \
              --arg news "${{ steps.news.outputs.news6 }}" \
              '{
                touser: $touser,
                template_id: $template_id,
                data: {
                  first: { value: "头条热榜 6/6", color: "#173177" },
                  keyword1: { value: " " },
                  keyword2: { value: $news },
                  remark: { value: " " }
                }
              }')"

name: Daily Push

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Get Gold Price
        id: gold
        run: |
          GOLD_RESPONSE=$(curl -s -X GET 'https://v2.xxapi.cn/api/goldprice')
          echo "$GOLD_RESPONSE" > gold.json
          GOLD_PRICE=$(echo "$GOLD_RESPONSE" | jq -r '.data.bank_gold_bar_price[] | select(.bank=="建设银行龙鼎金条") | .price // "暂无"')
          echo "gold_price=$GOLD_PRICE" >> $GITHUB_OUTPUT

      - name: Get News
        id: news
        run: |
          NEWS_RESPONSE=$(curl -s -X GET 'https://v2.xxapi.cn/api/toutiaohot' \
            -H "Authorization: Bearer ${{ secrets.GOLD_API_KEY }}")
          echo "$NEWS_RESPONSE" > news.json
          NEWS_LIST=$(echo "$NEWS_RESPONSE" | jq -r '.data[]?.title' | head -5)
          # 添加序号，并用字面量 \n 替换真实换行符
          NEWS_FORMATTED=$(echo "$NEWS_LIST" | nl -w1 -s'. ' | awk '{printf "%s\\n", $0}' | sed 's/\\n$//')
          echo "news=$NEWS_FORMATTED" >> $GITHUB_OUTPUT

      - name: Get Access Token
        id: token
        run: |
          TOKEN_RESPONSE=$(curl -s "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid=${{ secrets.WECHAT_APPID }}&secret=${{ secrets.WECHAT_SECRET }}")
          ACCESS_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')
          echo "token=$ACCESS_TOKEN" >> $GITHUB_OUTPUT

      - name: Send Template Message
        run: |
          GOLD_PRICE="${{ steps.gold.outputs.gold_price }}"
          NEWS="${{ steps.news.outputs.news }}"
          
          curl -s -X POST "https://api.weixin.qq.com/cgi-bin/message/template/send?access_token=${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg touser "${{ secrets.WECHAT_OPENID }}" \
              --arg template_id "${{ secrets.WECHAT_TEMPLATE_ID }}" \
              --arg gold_price "$GOLD_PRICE 元/克" \
              --arg news "$NEWS" \
              '{
                touser: $touser,
                template_id: $template_id,
                data: {
                  first: { value: "每日简报", color: "#173177" },
                  keyword1: { value: $gold_price, color: "#FF0000" },
                  keyword2: { value: $news },
                  remark: { value: "祝你生活愉快！" }
                }
              }')"
